# Terminal
set -g default-terminal "tmux-256color"

# History
set -g history-limit 50000

# Escape time
set -sg escape-time 200

# Vi keys
set -g mode-keys vi

# Mouse
set -g mouse on

# Base index
set -g base-index 1
set -g pane-base-index 1

# Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Focus events
set -g focus-events on

# Reload config
unbind r
bind t source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"

# Move tmux status bar to top
set-option -g status-position top

# vim-tpipeline
# Plugins (via TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @plugin 'vimpostor/vim-tpipeline'

set -g @ukiyo-theme 'nord/default'
set -g @ukiyo-ignore-window-colors true
set -g @ukiyo-continuum-time-threshold 60

# set -g @ukiyo-status-left ""
# set -g @ukiyo-status-right ""

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5' # save every 5 minutes

run '~/.tmux/plugins/tpm/tpm'
